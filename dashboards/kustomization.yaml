# kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - name: grafana-dashboard-hivebox-app
    files:
      - ./app-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"
        
  - name: grafana-dashboard-k8s-cluster
    files:
      - ./k8s-dashboard.json
    options:
      labels:
        grafana_dashboard: "1"

generatorOptions:
  disableNameSuffixHash: true