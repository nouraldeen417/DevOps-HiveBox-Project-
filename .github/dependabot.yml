# .github/dependabot.yml
version: 2

updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-pip-updates:
        patterns: ["*"]                          # one PR for all pip updates
        update-types:
          - "minor"
          - "patch"
        exclude-patterns: ["pytest"]             # keep pytest separate if you want manual control

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      all-actions-updates:
        patterns: ["*"]                          # one PR for all actions updates

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # docker not grouped — each base image bump reviewed separately