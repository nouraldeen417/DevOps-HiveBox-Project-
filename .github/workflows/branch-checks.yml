name: Branch Checks

on:
  push:
    branches-ignore: [main]   # runs on every branch except main, fast feedback while developing
  workflow_dispatch:          # allows manual trigger from GitHub UI

# Cancel previous runs on the same branch — saves runner minutes
# Why: if you push multiple commits quickly, only the latest run matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/nouraldeen417/devops-hivebox

jobs:
    lint:
        name: Lint Code & Dockerfile
        runs-on: ubuntu-latest
        steps:
            # Audit outbound network traffic from the GitHub Actions runner for security visibility.
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                egress-policy: audit

            # Step is getting the code into the runner
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            # Install Python on the runner
            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                # Why cache: skips re-downloading packages on every run
                cache: pip

            # Install Dependencies
            # Why: pylint is in requirements.txt.
            - name: Install dependencies
              run: pip install -r requirements.txt pylint

            # Run Pylint on your source code
            - name: Run Pylint
              run: pylint src/ --fail-under=8.0
            # Why --fail-under=8.0:
            # Pylint scores code 0-10. Below 8.0 = CI fails and blocks the PR.

            # Using Hadolint Action to scan the Dockerfile
            - name: Run Hadolint
              uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
              with:
                dockerfile: Dockerfile

    test:
        name: Run unit tests
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                egress-policy: audit

            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Setup Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run Pytest
              run: pytest tests/test_app.py -v
            # Why -v: verbose output shows each test name and result.

    integration-test:
        name: Integration test via Docker Compose
        runs-on: ubuntu-latest
        needs: test
        # Why after test: no point spinning up the full stack if unit tests already fail
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Set up Docker Buildx
              # Enables layer caching — reuses unchanged layers
              uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

            - name: Build image
              uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1
              with:
                context: .
                push: false
                load: true
                # Why load: makes image available locally for docker compose
                tags: ${{ env.IMAGE_NAME }}:test
                cache-from: type=gha
                cache-to: type=gha,mode=max

            - name: Start full stack
              run: |
                docker compose -f docker-compose.yml up -d
                echo "Waiting for services to be healthy..."

            - name: Wait for app to be ready
              # Why: app depends on valkey and minio being ready first
              # retries every 5s for up to 60s before failing
              run: |
                for i in $(seq 1 12); do
                  curl -sf http://localhost:5000/version && echo "✅ App is ready" && break
                  echo "Attempt $i/12 — waiting 5s..."
                  sleep 5
                  if [ $i -eq 12 ]; then
                    echo "❌ App did not become ready in time"
                    docker compose -f docker-compose.test.yml logs
                    exit 1
                  fi
                done

            - name: Smoke test all endpoints
              # Why curl -f: returns non-zero exit code on HTTP errors (4xx, 5xx)
              # so the step fails if any endpoint returns an error response
              run: |
                echo "Testing /version..."
                curl -sf http://localhost:5000/version | jq .

                echo "Testing /temperature..."
                curl -sf http://localhost:5000/temperature | jq .

                echo "Testing /readyz..."
                curl -sf http://localhost:5000/readyz | jq .

                echo "Testing /store..."
                curl -sf http://localhost:5000/store | jq .

                echo "Testing /metrics..."
                curl -sf http://localhost:5000/metrics | head -20

            - name: Show logs on failure
              if: failure()
              run: docker compose -f docker-compose.test.yml logs

            - name: Tear down
              if: always()
              # Why always: clean up even if smoke tests fail
              run: docker compose -f docker-compose.yml down -v