name: Continuous Integration

on:
  push:
    branches-ignore: [main]   # runs on every branch except main, fast feedback while developing
  workflow_dispatch:          # allows manual trigger from GitHub UI

# Cancel previous runs on the same branch — saves runner minutes
# Why: if you push multiple commits quickly, only the latest run matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    lint:
        name: Lint Code & Dockerfile
        runs-on: ubuntu-latest
        steps:
            # Audit outbound network traffic from the GitHub Actions runner for security visibility.
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
              with:
                egress-policy: audit

            # Step is getting the code into the runner
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            # Install Python on the runner
            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                # Why cache: skips re-downloading packages on every run
                cache: pip

            # Install Dependencies
            # Why: pylint is in requirements.txt.
            - name: Install dependencies
              run: pip install -r requirements.txt pylint

            # Run Pylint on your source code
            - name: Run Pylint
              run: pylint src/ --fail-under=8.0
            # Why --fail-under=8.0:
            # Pylint scores code 0-10. Below 8.0 = CI fails and blocks the PR.

            # Using Hadolint Action to scan the Dockerfile
            - name: Run Hadolint
              uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
              with:
                dockerfile: Dockerfile

    test:
        name: Run test files
        runs-on: ubuntu-latest
        needs: lint
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
              with:
                egress-policy: audit

            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Setup Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run Pytest
              run: pytest tests/test_app.py -v
            # Why -v: verbose output shows each test name and result.