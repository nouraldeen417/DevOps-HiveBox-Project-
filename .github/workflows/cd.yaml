name: Continuous Delivery

on:

  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]



# Cancel previous CD run if a new push happens
# Why: only the latest merged code should be delivered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/moelgenady/devops-hivebox
  IMAGE_TAG: "0.0.2"


jobs:
    release:
        name: Build and Push Dovker Image to Github Container Registry
        runs-on: ubuntu-latest

        # If CI failed — CD job is skipped entirely. Nothing is pushed.


        if: >
              github.event.workflow_run.conclusion == 'success'

    
        permissions:
            contents: read
            packages: write

        steps:

            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
              with:
                egress-policy: audit
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            
            - name: Set up Docker Buildx
              # Enables Docker layer caching — reuses unchanged layers
              # significantly speeds up builds when only code changes
              uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
              with:
                registry: ghcr.io
                username: ${{ github.actor }} # Automatically set by GitHub to the username that triggered the workflow.
                password: ${{ secrets.GITHUB_TOKEN }} # Automatically created by GitHub for every repository. Every workflow gets it injected automatically

            - name: Build the image and Push it 
            # Builds and pushes 3 tags to ghcr.io:
            #   :latest      — always newest
            #   :0.0.2       — version tag matching app.py
            #   :sha-abc1234 — exact commit for rollback
              uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
              with:
                context: .
                push: true
                tags: |
                    ${{ env.IMAGE_NAME }}:latest
                    ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                    ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
