# What it does: Runs on every Pull Request and blocks merging if the PR introduces a dependency with a known CVE. Catches the case where someone adds a vulnerable package version in a new branch before it ever reaches main

name: Dependency Review

on:
  pull_request:
    branches: [main]
  # Why only pull_request:
  # This check only makes sense on PRs — it compares
  # the dependency changes introduced by the PR against
  # the base branch and blocks if any are vulnerable

permissions:
  contents: read
jobs:
  dependency-review:
    name: Scan dependency changes
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write  # needed to post a comment on the PR

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate  # blocks PRs with medium+ CVEs
          comment-summary-in-pr: always
          # Why always: posts a clear summary comment on every PR
          # so you can see exactly what was scanned and why it
          # passed or failed without leaving GitHub