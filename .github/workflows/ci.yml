    terrascan:
        name: Scan Kubernetes & Helm Manifests
        runs-on: ubuntu-latest
        # needs: [build_and_e2e, sonarqube]
        needs: build_and_e2e
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
              with:
                egress-policy: audit
                
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Run Terrascan on Kustomize
              # Scans the static k8s infrastructure folder
              uses: tenable/terrascan-action@main
              with:
                iac_type: k8s
                iac_dir: k8s/infrastructure/
                only_warn: true
                # Why only_warn: reports issues without failing the build

            - name: Run Terrascan on Helm Chart
              # Scans the Helm chart templates dynamically
              uses: tenable/terrascan-action@main
              with:
                iac_type: helm
                iac_dir: k8s/app/helm/hivebox/
                only_warn: true
    push:
        name: push image to ghcr.io
        runs-on: ubuntu-latest
        # needs: [build_and_e2e, sonarqube]
        needs: terrascan
        permissions:
            contents: read
            packages: write
        steps:
          - name: Harden runner
            uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
            with:
              egress-policy: audit
          - name: checkout code
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
                
          - name: Set up Docker Buildx
              # Enables Docker layer caching — reuses unchanged layers
              # significantly speeds up builds when only code changes
            uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
            with:
              registry: ghcr.io
              username: ${{ github.actor }} # Automatically set by GitHub to the username that triggered the workflow.
              password: ${{ secrets.GITHUB_TOKEN }} # Automatically created by GitHub for every repository. Every workflow gets it injected automatically

          - name: Build the image and Push it 
          # Builds and pushes 3 tags to ghcr.io:
          #   :latest      — always newest
          #   :0.0.2       — version tag matching app.py
          #   :sha-abc1234 — exact commit for rollback
            uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
            with:
              context: .
              push: true
              tags: |
                  ${{ env.IMAGE_NAME }}:latest
                  ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                  ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
              cache-from: type=gha
              cache-to: type=gha,mode=max
