name: CI

on:
    push:
        branches: [ main, development, testing] 
    pull_request:
        branches: [ main, development]


# Lint → Test → Build
jobs:
    lint:
        name: Lint Code $ Dockerfile
        runs-on: ubuntu-latest

        # Enable Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
        env:
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


        steps:
            # Step is getting the code into the runner
            - name: checkout code
              uses: actions/checkout@v4
            
            # Install Python on the runner
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            
            # Install Dependencies 
            # Why: pylint is in requirements.txt.
            # We need it installed before we can run it.
            - name: Install dependencies
              run: pip install -r requirements.txt
            
            # Run Pylint on your source code
            - name: Run Pylint
              run: pylint src/app.py --fail-under=8.0
            # Why --fail-under=8.0:
            # Pylint scores code 0-10.
            # Below 8.0 = CI fails and blocks the PR.

            # Using Hadolint Action to scan the Dockerfile
            - name: Run Hadolint
              uses: hadolint/hadolint-action@v3.3.0
              with:
                dockerfile: Dockerfile

    test:
        name: Run test files
        runs-on: ubuntu-latest
        needs: lint


        # Enable Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
        env:
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


        steps:
            - name: checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: '3.12'
            
            - name: Install dependencies
              run:  pip install -r requirements.txt

            
            - name: Run Pytest
              run: pytest tests/ -v
            # Why -v: verbose output shows each test name and result.

    build:
        name: Build Docker Image from the exisiting dockerfile
        runs-on: ubuntu-latest
        needs: test

        # Enable Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
        env:
         FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


        steps:
            - name: checkout code
              uses: actions/checkout@v4
            
            - name: Build Docker Image
              run:  docker build --no-cache -t hivebox:0.0.2 .
            
              # Scan the Image using Trivey
            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@master
              with:
                image-ref: hivebox:0.0.2
                format: table
                exit-code: 1
                severity: CRITICAL
                ignore-unfixed: true     

            - name: Start container
              run: docker run -d --name hivebox-test -p 5000:5000 hivebox:0.0.2
            
            
            - name: Wait for container to be ready
              run: sleep 3

            # Calling the endpoint from the container 
            - name: Call /version endpoint
              run: |
                    RESPONSE=$(curl -s http://localhost:5000/version)
                    echo "Response: $RESPONSE"
                    echo $RESPONSE | grep -q '"version"'
            
            - name: Stop container
              run: docker stop hivebox-test
    
            
