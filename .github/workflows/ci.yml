name: Continuous Integration

on:
  pull_request:
    branches: [ main ]

# Cancel previous runs on the same PR — saves runner minutes
# Why: if you push multiple commits quickly, only the latest run matters
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


# Enable Node.js 24 runtime for GitHub Actions to avoid Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: hivebox
  IMAGE_TAG: "0.0.2"

jobs:
    lint:
        name: Lint Code $ Dockerfile
        runs-on: ubuntu-latest


        steps:
            #  Audit outbound network traffic from the GitHub Actions runner for security visibility.
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
              with:
                egress-policy: audit


            # Step is getting the code into the runner
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            
            # Install Python on the runner
            - name: Set up Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                #  Why cache: skips re-downloading packages on every run
                cache: pip
            
            # Install Dependencies 
            # Why: pylint is in requirements.txt.
            # We need it installed before we can run it.
            - name: Install dependencies
              run: pip install -r requirements.txt pylint
            
            # Run Pylint on your source code
            - name: Run Pylint
              run: pylint src/app.py --fail-under=8.0
            # Why --fail-under=8.0:
            # Pylint scores code 0-10.
            # Below 8.0 = CI fails and blocks the PR.

            # Using Hadolint Action to scan the Dockerfile
            - name: Run Hadolint
              uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
              with:
                dockerfile: Dockerfile

    test:
        name: Run test files
        runs-on: ubuntu-latest
        needs: lint

        steps:

            # Audit outbound network traffic from the GitHub Actions runner for security visibility.
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
              with:
                egress-policy: audit
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

            - name: Setup Python
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
              with:
                python-version: '3.12'
                cache: pip
            
            - name: Install dependencies
              run:  pip install -r requirements.txt

            
            - name: Run Pytest
              run:  pytest tests/test_app.py -v
            # Why -v: verbose output shows each test name and result.

    build:
        name: Build Docker Image from the exisiting dockerfile
        runs-on: ubuntu-latest
        needs: test

        steps:

            # Audit outbound network traffic from the GitHub Actions runner for security visibility.
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
              with:
                egress-policy: audit
            - name: checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
            
            - name: Set up Docker Buildx
              # Enables Docker layer caching — reuses unchanged layers
              # significantly speeds up builds when only code changes
              uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

            - name: Build Docker image
              uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
              with:
                context: .
                push: false
                # Why push false: CI only builds and tests — CD handles pushing
                load: true
                # Why load: makes image available to docker run in next steps
                tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                cache-from: type=gha
                # Why cache-from gha: restores Docker layer cache from GitHub Actions cache
                cache-to: type=gha,mode=max
                # Why cache-to: saves Docker layer cache for next run
            
              # Scan the Image using Trivey
            - name: Scan image with Trivy
              uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
              with:
                image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                format: table
                exit-code: 1
                severity: CRITICAL
                ignore-unfixed: true     

            - name: Start container
              run: docker run -d --name hivebox-test -p 5000:5000 ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            
            - name: Wait for container to be ready
              run: sleep 3


            - name: Set up Python for integration tests
              uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
              with:
                python-version: '3.12'
                cache: pip

            - name: Install dependencies for integration tests
              run: pip install -r requirements.txt

            - name: Run integration tests
              # Hits the real running container at localhost:5000
              # No mocking — real HTTP calls against real Docker container
              # Covers /version, /temperature, /metrics endpoints
              run: pytest tests/integration/ -v


            # Calling the endpoint from the container 
            - name: Call /version endpoint
              run: |
                    RESPONSE=$(curl -s http://localhost:5000/version)
                    echo "Response: $RESPONSE"
                    echo $RESPONSE | grep -q '"version"'
            
            # Calling the Temperature Endpoint
            - name: Test /temperature endpoint
              run: |
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/temperature)
                echo "Status code: $STATUS"
                # 200 = live data available
                # 503 = all boxes stale — both are valid behavior
                if [ "$STATUS" != "200" ] && [ "$STATUS" != "503" ]; then
                  echo "Unexpected status code: $STATUS"
                  exit 1
                fi

            # Calling Metrics endpoints 
            - name: Test /metrics endpoint
              run: |
                RESPONSE=$(curl -s http://localhost:5000/metrics)
                echo "$RESPONSE" | grep -q "flask_http" || (echo "/metrics missing Prometheus data" && exit 1)
                echo "/metrics endpoint healthy"
                  
                
            - name: Stop container
              # Always runs — cleans up container even if tests fail
              if: always()
              run: docker stop hivebox-test && docker rm hivebox-test

    sonarqube:
        name: SonarQube quality gate
        runs-on: ubuntu-latest
        needs: test
        # Why after test: code must pass unit tests before quality analysis
        # Why parallel with build: SonarQube does not need Docker
        # running both at the same time saves pipeline minutes

        steps:
          - name: Harden runner
            # Monitors outbound traffic — important because SonarQube
            # uploads your source code to sonarcloud.io
            uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
            with:
              egress-policy: audit

          - name: Checkout code
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
            with:
              fetch-depth: 0
              # Why fetch-depth 0: SonarQube needs full git history

          - name: SonarQube scan
            # Uploads source code to SonarCloud and runs full analysis
            # Reads config from sonar-project.properties at repo root
            # Checks for:
            # - security vulnerabilities in Python code
            # - bugs and unreachable code
            # - code smells and complexity issues
            # - test coverage percentage
            # Results appear at sonarcloud.io and as PR comments
            uses: sonarsource/sonarqube-scan-action@master
            env:
              SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              SONAR_HOST_URL: https://sonarcloud.io


          - name: SonarQube quality gate check
            # Waits for SonarCloud to finish analysis
            # Fails CI if quality gate fails — enforces code quality as a hard gate
            # Without this step CI passes even if SonarCloud finds critical issues
            uses: sonarsource/sonarqube-quality-gate-action@master
            timeout-minutes: 5
            # Why timeout: prevents CI from hanging if SonarCloud is slow
            env:
              SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    terrascan:
        name: Scan Kubernetes Manifest Files
        runs-on: ubuntu-latest
        needs: [build, sonarqube]

        steps:
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
              with:
                egress-policy: audit
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

            - name: Run Terrascan
              uses: tenable/terrascan-action@main  # v1.5.0
              with:
                iac_type: k8s
                iac_dir: K8S/
                only_warn: true
                # Why only_warn: reports issues without failing the build
                # tighten to false after fixing all findings