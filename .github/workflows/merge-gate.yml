    terrascan:
        name: Scan Kubernetes & Helm Manifests
        runs-on: ubuntu-latest
        # needs: [build_and_e2e, sonarqube]
        if: github.actor != 'dependabot[bot]'
        needs: build_and_e2e
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
              with:
                egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

            - name: Run Terrascan on Kustomize
              # Scans the static k8s infrastructure folder
              uses: tenable/terrascan-action@main
              with:
                iac_type: k8s
                iac_dir: k8s/infrastructure/
                only_warn: true
                # Why only_warn: reports issues without failing the build

            - name: Run Terrascan on Helm Chart
              # Scans the Helm chart templates dynamically
              uses: tenable/terrascan-action@main
              with:
                iac_type: helm
                iac_dir: k8s/app/helm/hivebox/
                only_warn: true