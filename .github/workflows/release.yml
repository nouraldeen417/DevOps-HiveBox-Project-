name: Continuous Delivery

on:
  release:
    types: [published]   # triggered by creating a GitHub Release from the GUI, targeting main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ghcr.io/nouraldeen417/devops-hivebox
  IMAGE_TAG: ${{ github.event.release.tag_name }}
  # Why this instead of github.ref_name: release event gives the tag name directly
  # and only fires once the release is actually published, not on every tag push.

jobs:
    verify-tag-on-main:
        name: Verify release tag points to latest main
        runs-on: ubuntu-latest
        steps:
            - name: Harden runner
              uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0
              with:
                egress-policy: audit

            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
              with:
                fetch-depth: 0

            - name: Confirm tag is on main HEAD
              # Why: prevents releasing a tag that was pushed against
              # an old or unreviewed commit instead of the approved main branch
              run: |
                git fetch origin main --depth=1
                MAIN_SHA=$(git rev-parse origin/main)
                TAG_SHA=$(git rev-parse ${{ github.sha }})
                if [ "$TAG_SHA" != "$MAIN_SHA" ]; then
                  echo "❌ Release tag does not point to the latest main commit"
                  echo "main:   $MAIN_SHA"
                  echo "tag:    $TAG_SHA"
                  exit 1
                fi
                echo "✅ Release tag matches main HEAD"

    push:
        name: push image to ghcr.io
        runs-on: ubuntu-latest
        needs: verify-tag-on-main
        permissions:
            contents: read
            packages: write
        steps:
          - name: Harden runner
            uses: step-security/harden-runner@0634a2670c59f64b4a01f0f96f84700a4088b9f0  # v2.12.0
            with:
              egress-policy: audit
          - name: checkout code
            uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

          - name: Set up Docker Buildx
              # Enables Docker layer caching — reuses unchanged layers
              # significantly speeds up builds when only code changes
            uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

          - name: Log in to GitHub Container Registry
            uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
            with:
              registry: ghcr.io
              username: ${{ github.actor }} # Automatically set by GitHub to the username that triggered the workflow.
              password: ${{ secrets.GITHUB_TOKEN }} # Automatically created by GitHub for every repository. Every workflow gets it injected automatically

          - name: Build the image and Push it
          # Builds and pushes 3 tags to ghcr.io:
          #   :latest      — always newest
          #   :v1.0.2      — version tag matching the GitHub Release
          #   :sha-abc1234 — exact commit for rollback
            uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1  # v6.16.0
            with:
              context: .
              push: true
              tags: |
                  ${{ env.IMAGE_NAME }}:latest
                  ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
                  ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
              cache-from: type=gha
              cache-to: type=gha,mode=max

    update-helm-values:
          name: Update Helm values with new image tag
          runs-on: ubuntu-latest
          needs: push
          permissions:
            contents: write        # allows pushing to the repo
          steps:
            - name: Checkout code
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
              with:
                ref: main              # release event always targets main
                token: ${{ secrets.RELEASE_BOT_TOKEN }}   # PAT, not GITHUB_TOKEN
                # Note: this push needs "github-actions[bot]" added to main's
                # branch protection bypass list. This is the one accepted exception
                # in our setup — the bot only ever touches values.yaml, in this job only.

            - name: Install yq
              run: |
                wget -qO /usr/local/bin/yq \
                  https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
                chmod +x /usr/local/bin/yq

            - name: Update image tag in values.yaml
              run: |
                yq e '.image.tag   = "${{ env.IMAGE_TAG }}"'   -i k8s/app/helm/hivebox/values.yaml
                yq e '.app.version = "${{ env.IMAGE_TAG }}"'   -i k8s/app/helm/hivebox/values.yaml

            - name: Commit and push
              run: |
                git config user.email "your-email@example.com"
                git config user.name "your-username"
                git add k8s/app/helm/hivebox/values.yaml
                git diff --staged --quiet && echo "No changes" && exit 0
                git commit -m "chore: bump to ${{ env.IMAGE_TAG }} [skip ci]"
                git push https://x-access-token:${{ secrets.RELEASE_BOT_TOKEN }}@github.com/${{ github.repository }}.git main