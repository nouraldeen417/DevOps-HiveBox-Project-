# What it does: Scans your Python source code for security vulnerabilities without running it — things like hardcoded secrets, insecure function calls, injection risks. Results appear in your repo under Security → Code scanning alerts.

# SAST Tools
name: CodeQL

on:

  pull_request:
    branches: [main]


permissions:
    contents: read

jobs:
  analyze:
    name: Analyze Python code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write  # needed to upload results to Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v3.28.12
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v3.28.12
        with:
          category: "/language:python"