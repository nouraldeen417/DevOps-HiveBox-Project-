# What it does: Scans your Python source code for security vulnerabilities without running it — things like hardcoded secrets, insecure function calls, injection risks. Results appear in your repo under Security → Code scanning alerts.

# SAST Tools
name: CodeQL

on:

  pull_request:
    branches: [main]


permissions:
    contents: read

jobs:
  analyze:
    name: Analyze Python code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write  # needed to upload results to Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v3.28.12
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v3.28.12
        with:
          category: "/language:python"