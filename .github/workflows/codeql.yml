# What it does: Scans your Python source code for security vulnerabilities without running it — things like hardcoded secrets, insecure function calls, injection risks. Results appear in your repo under Security → Code scanning alerts.

# SAST Tools
name: CodeQL

on:

  pull_request:
    branches: [main]


permissions:
    contents: read

jobs:
  analyze:
    name: Analyze Python code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write  # needed to upload results to Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v3.28.12
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v3.28.12
        with:
          category: "/language:python"