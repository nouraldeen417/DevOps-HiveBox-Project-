# What it does: Scans your Python source code for security vulnerabilities without running it — things like hardcoded secrets, insecure function calls, injection risks. Results appear in your repo under Security → Code scanning alerts.

# SAST Tools
name: CodeQL

on:

  pull_request:
    branches: [main]


permissions:
    contents: read

jobs:
  analyze:
    name: Analyze Python code
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write  # needed to upload results to Security tab

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@181d5eefc20863364f96762470ba6f862bdef56b  # v3.28.12
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@181d5eefc20863364f96762470ba6f862bdef56b  # v3.28.12
        with:
          category: "/language:python"