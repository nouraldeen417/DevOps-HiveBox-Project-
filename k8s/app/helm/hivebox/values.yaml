# Default values for hivebox.

replicaCount: 2

image:
  repository: ghcr.io/nouraldeen417/devops-hivebox
  tag: 0.0.2
  pullPolicy: Never

service:
  port: 80
  targetPort: 5000

ingress:
  host: hivebox.local
  tlsSecret: hivebox-tls

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

hpa:
  minReplicas: 2
  maxReplicas: 5
  cpuUtilization: 70

config:
  senseboxIds: "5eba5fbad46fb8001b799786,5c21ff8f919bf8001adf2488,5ade1acf223bd80019a1011c"
  valkeyHost: "valkey"
  valkeyPort: "6379"
  minioEndpoint: "minio:9000"
  minioBucket: "hivebox"

metrics:
  enabled: true
  