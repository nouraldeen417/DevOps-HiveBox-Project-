# configmap.yaml
# Stores environment variables separately from the Docker image.
# This means you can change senseBox IDs without rebuilding the image —
# just update this file and re-apply it to the cluster.

apiVersion: v1
kind: ConfigMap
metadata:
  name: hivebox-config
  namespace: hivebox
  labels:
    app: hivebox
data:
  # Comma-separated senseBox IDs — read by app.py via os.environ.get()
  SENSEBOX_IDS: "5eba5fbad46fb8001b799786,5c21ff8f919bf8001adf2488,5ade1acf223bd80019a1011c"
  VALKEY_HOST: "valkey"
  VALKEY_PORT: "6379"
  MINIO_ENDPOINT: "minio:9000"
  MINIO_BUCKET: "hivebox"