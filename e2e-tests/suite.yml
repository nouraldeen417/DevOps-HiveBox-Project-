name: Hivebox End-to-End Test Suite
vars:
  host: http://localhost

testcases:
  - name: Verify Version Endpoint
    steps:
      - type: http
        method: GET
        url: {{.vars.host}}/version
        assertions:
          - result.statuscode ShouldEqual 200
          - result.bodyjson.version ShouldExist

  - name: Test Manual MinIO Export
    steps:
      - type: http
        method: POST
        url: {{.vars.host}}/store
        assertions:
          - result.statuscode ShouldEqual 200

  - name: Verify Readiness Probe Logic
    steps:
      - type: http
        method: GET
        url: {{.vars.host}}/readyz
        assertions:
          - result.statuscode ShouldEqual 200

  - name: Validate Custom Prometheus Metrics
    steps:
      - type: http
        method: GET
        url: {{.vars.host}}/metrics
        assertions:
          - result.statuscode ShouldEqual 200
          - result.body ShouldContainSubstring flask_http